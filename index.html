function sentimentColor(s) { return s==='positive'?C.green:s==='negative'?C.red:s==='warning'?C.amber:C.muted; }
function trendArrow(t) { return t==='up'?'\u2191':t==='down'?'\u2193':'\u2192'; }
function funnelColor(p) { return p===null?'#cccccc':p>=75?C.green:p>=50?C.amber:C.red; }

function buildSparkline(data) {
  if (!data || data.length < 3) return '';
  var max = Math.max.apply(null, data);
  var min = Math.min.apply(null, data);
  var range = max - min || 1;
  var color = data[data.length-1] >= data[0] ? C.green : C.red;
  var h = '<div style="display:flex;align-items:flex-end;gap:2px;height:20px;margin-top:8px;">';
  for (var i = 0; i < data.length; i++) {
    var ht = Math.max(3, Math.round(((data[i] - min) / range) * 18));
    var opacity = i === data.length - 1 ? '1' : '0.4';
    h += '<div style="width:6px;background:' + color + ';height:' + ht + 'px;border-radius:2px;opacity:' + opacity + ';"></div>';
  }
  return h + '</div>';
}

function cardTargetStatus(m) {
  if (!m.target && m.target !== 0) return null;
  var ratio = m.lowerIsBetter ? m.target / m.numVal : m.numVal / m.target;
  if (ratio >= 1) return C.green;
  if (ratio >= 0.8) return C.amber;
  return C.red;
}

    h += '<div class="metric-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
      '<div style="flex:1;"><div style="font-size:12px;letter-spacing:0.5px;color:#999999;margin-bottom:8px;font-weight:500;text-transform:uppercase;">' + m.label + '</div>' +
      '<div style="font-size:28px;font-weight:700;color:' + C.text + ';line-height:1.0;margin-bottom:6px;">' + m.value + '</div>' +
      '<div style="font-size:13px;color:' + sentimentColor(m.sentiment) + ';display:flex;align-items:center;gap:4px;font-weight:500;">' + arrow + '<span>' + m.context + '</span></div>';
    if (m.target || m.target === 0) {
      var tColor = cardTargetStatus(m);
      var tVal = m.lowerIsBetter ? '\u2264' + m.target + '%' : m.target + '%';
      h += '<div style="font-size:12px;color:#999999;margin-top:4px;display:flex;align-items:center;gap:6px;">Target: ' + tVal + ' by ' + m.targetYear + ' <span class="status-dot" style="background:' + tColor + ';"></span></div>';
    }
    h += '</div>';
    if (m.sparkData) {
      h += '<div style="margin-left:12px;flex-shrink:0;">' + buildSparkline(m.sparkData) + '</div>';
    }
    h += '</div>';
    if (m.disagg) {
      h += '<div style="border-top:1px solid #e8e8e5;margin-top:10px;padding-top:8px;font-size:12px;color:#999999;">' + m.disagg + '</div>';
    }
    h += '</div>';
  }
  return h + '</div>';
}

/* ── FINDINGS PANEL ("SO WHAT") ───────────────────────────────────────────── */

function findingsPanel(headline, bullets, closing) {
  var h = '<div class="findings-panel">';
  h += '<div style="font-size:20px;font-weight:700;color:' + C.text + ';margin-bottom:16px;line-height:1.3;">' + headline + '</div>';
  for (var i = 0; i < bullets.length; i++) {
    h += '<p style="font-size:14px;color:#444444;margin:0 0 8px 0;line-height:1.7;">\u2022 ' + bullets[i] + '</p>';
  }
  h += '<p style="font-size:14px;font-style:italic;color:#888888;margin:16px 0 0 0;line-height:1.7;">' + closing + '</p>';
  return h + '</div>';
}

function generateFindings(layer) {
  if (layer === 'people') {
    var declined = 0; var total = 0;
    for (var i = 0; i < educationMetrics.length; i++) {
      total++;
      if (educationMetrics[i].sentiment === 'negative') declined++;
    }
    var hsVal = educationTrends.hsGrad[educationTrends.hsGrad.length - 1];
    var hsPrev = educationTrends.hsGrad[educationTrends.hsGrad.length - 2];
    var hsDelta = Math.round((hsVal - hsPrev) * 10) / 10;
    var enrollVal = 71;
    var internVal = 12;
    var headline = declined + ' of ' + total + ' pipeline metrics are flagged negative.';
    if (hsVal < hsPrev) {
      headline = 'The education pipeline is losing students at every stage \u2014 ' + declined + ' of ' + total + ' metrics declined.';
    } else if (hsVal > hsPrev) {
      headline = 'The HS graduation rate improved to ' + hsVal + '%, but ' + declined + ' of ' + total + ' pipeline metrics remain negative.';
    }
    var bullets = [];
    if (hsVal < hsPrev) {
      bullets.push('The HS graduation rate fell to ' + hsVal + '%, a ' + Math.abs(hsDelta) + 'pp decline \u2014 the steepest drop in two decades.');
    } else {
      bullets.push('The HS graduation rate stands at ' + hsVal + '%, ' + (hsVal > hsPrev ? 'up ' + hsDelta + 'pp' : 'unchanged') + ' from the prior year.');
    }
    if (enrollVal < 75) {
      bullets.push('Only ' + enrollVal + '% of NYC high school graduates enrolled in college, down from 81% in 2019. Nearly ' + (100 - enrollVal) + '% of graduates are entering adulthood without a postsecondary plan.');
    }
    if (internVal < 20) {
      bullets.push('Just ' + internVal + '% of CUNY undergraduates complete a paid internship, compared to 57% nationally. This gap is the single largest barrier between education and employment in the city\u2019s pipeline.');
    }
    var closing = 'Without structural intervention in career-connected learning and employer partnerships, the pipeline will continue to produce graduates the labor market cannot absorb.';
    return findingsPanel(headline, bullets, closing);
  }
  if (layer === 'labor') {
    var totalGain = 0; var totalLoss = 0; var topSector = ''; var topGain = 0;
    for (var i = 0; i < sectorData.changes.length; i++) {
      if (sectorData.changes[i] > 0) { totalGain += sectorData.changes[i]; if (sectorData.changes[i] > topGain) { topGain = sectorData.changes[i]; topSector = sectorData.sectors[i]; } }
      else totalLoss += sectorData.changes[i];
    }
    var topPct = totalGain > 0 ? Math.round(topGain / totalGain * 100) : 0;
    var elPeak = 72.5; var elCurrent = entryLevel.values[entryLevel.values.length - 1];
    var elDecline = Math.round((1 - elCurrent / elPeak) * 1000) / 10;
    var gradsPerPosting = Math.round(93 / elCurrent * 10) / 10;
    var jcCurrent = jobCreation.values[jobCreation.values.length - 1];
    var headline = topPct > 80
      ? 'Job creation in NYC is running on a single engine: ' + topSector + ' accounted for ' + topPct + '% of all jobs added.'
      : 'The labor market added ' + totalGain.toLocaleString() + ' jobs but lost ' + Math.abs(totalLoss).toLocaleString() + ' across other sectors.';
    var bullets = [];
    bullets.push('Entry-level job postings have fallen ' + elDecline + '% since 2022, from ' + elPeak + 'K to ' + elCurrent + 'K. Roughly ' + gradsPerPosting + ' graduates now compete for every available entry-level position.');
    if (jcCurrent < 50) {
      bullets.push('The city added just ' + jcCurrent + 'K private sector jobs in the first seven months of 2025, down from 173K in the same period in 2022.');
    }
    bullets.push('The highest-paying sectors (Financial Activities at $52/hr, Information at $55/hr) are cutting jobs, while the only large-scale hiring sector (Education & Health) pays a median of $24/hr.');
    var closing = 'The sectors that pay the most are cutting jobs. The only sector adding jobs at scale pays the least. This mismatch defines the labor market challenge for the next decade.';
    return findingsPanel(headline, bullets, closing);
  }
  if (layer === 'fiscal') {
    var maxGap = 0; var maxGapYear = '';
    for (var i = 0; i < budgetGaps.without.length; i++) {
      if (budgetGaps.without[i] > maxGap) { maxGap = budgetGaps.without[i]; maxGapYear = budgetGaps.labels[i]; }
    }
    var lastElv = elvSupply.accelerated[elvSupply.accelerated.length - 1];
    var lastYear = elvSupply.labels[elvSupply.labels.length - 1];
    var lastPit = pitLost.accelerated[pitLost.accelerated.length - 1];
    var ombGrowth = Math.round((revProjections.omb[revProjections.omb.length-1] / revProjections.omb[0] - 1) * 100 / (revProjections.labels.length - 1) * 10) / 10;
    var stagGrowth = Math.round((revProjections.stagnation[revProjections.stagnation.length-1] / revProjections.stagnation[0] - 1) * 100 / (revProjections.labels.length - 1) * 10) / 10;
    var headline = 'The city faces a projected $' + maxGap + 'B budget gap in ' + maxGapYear + ' without a property tax increase.';
    var bullets = [];
    bullets.push('Under stagnation conditions, revenue grows at just ' + stagGrowth + '% annually versus ' + ombGrowth + '% in the OMB forecast \u2014 a divergence that compounds to billions within three years.');
    bullets.push('By ' + lastYear + ', the city could be producing 93K graduates per year competing for as few as ' + lastElv + 'K entry-level positions under the accelerated displacement scenario.');
    bullets.push('The cumulative fiscal cost of youth underemployment could reach $' + lastPit + 'M by ' + lastYear + ' in lost PIT revenue alone.');
    var closing = 'The budget cannot be balanced through tax increases if the tax base itself is eroding. Investing in career-connected learning and employer partnerships is revenue protection, not discretionary spending.';
    return findingsPanel(headline, bullets, closing);
  }
  if (layer === 'mobilitystat') {
    var actionCount = 0; var watchCount = 0; var trackCount = 0; var pendingCount = 0; var totalMetrics = 0;
    var actionAgencies = [];
    for (var a = 0; a < agencies.length; a++) {
      if (agencies[a].status === 'action') { actionCount++; actionAgencies.push(agencies[a].name); }
      else if (agencies[a].status === 'watch') watchCount++;
      else trackCount++;
      for (var m = 0; m < agencies[a].metrics.length; m++) {
        totalMetrics++;
        if (agencies[a].metrics[m].pending) pendingCount++;
      }
    }
    var headline = actionCount + ' of ' + agencies.length + ' agencies require immediate attention.';
    var bullets = [];
    if (actionAgencies.length > 0) {
      bullets.push('Agencies flagged for action: ' + actionAgencies.join(', ') + '.');
    }
    if (pendingCount > totalMetrics / 2) {
      bullets.push(pendingCount + ' of ' + totalMetrics + ' tracked metrics lack current data. The absence of data is itself a finding: the city cannot manage what it cannot measure.');
    } else {
      bullets.push(pendingCount + ' of ' + totalMetrics + ' metrics are still awaiting data submission.');
    }
    bullets.push(watchCount + ' agencies are on watch status. ' + trackCount + ' are currently on track.');
    var closing = 'MobilitySTAT exists to ensure every metric has an owner and every flag has a response. The agencies above have been identified for escalation.';
    return findingsPanel(headline, bullets, closing);
  }
  return '';
}

/* ── AGENCY CARDS (with targets) ──────────────────────────────────────────── */

function metricStatus(m) {
  if (m.pending || m.numVal === undefined || m.numVal === null) return 'nodata';
  if (m.target === null || m.target === undefined) return 'nodata';
  var ratio = m.numVal / m.target;
  if (m.lowerIsBetter) ratio = m.target / m.numVal;
  if (ratio >= 1) return 'ontrack';
  if (ratio >= 0.8) return 'watch';
  return 'action';
}

function statusDot(st) {
  var colors = { ontrack: C.green, watch: C.amber, action: C.red, nodata: '#cccccc' };
  return '<span class="status-dot" style="background:' + (colors[st] || '#cccccc') + ';"></span>';
}

function buildAgencyCards(sorted) {
  var ontrack = 0, watch = 0, action = 0, nodata = 0;
  for (var a = 0; a < sorted.length; a++) {
    for (var mi = 0; mi < sorted[a].metrics.length; mi++) {
      var st = metricStatus(sorted[a].metrics[mi]);
      if (st === 'ontrack') ontrack++;
      else if (st === 'watch') watch++;
      else if (st === 'action') action++;
      else nodata++;
    }
  }
  var h = '<div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;">';
  var sumItems = [
    [C.green, '#f0fdf4', 'On Track', ontrack],
    [C.amber, '#fffbeb', 'Watch', watch],
    [C.red, '#fef2f2', 'Action Required', action],
    ['#cccccc', '#f5f5f3', 'No Data', nodata]
  ];
  for (var s = 0; s < sumItems.length; s++) {
    h += '<div style="background:' + sumItems[s][1] + ';border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:10px;"><span class="status-dot" style="background:' + sumItems[s][0] + ';"></span><span style="font-size:13px;color:#666666;">' + sumItems[s][2] + '</span><span style="font-size:20px;font-weight:700;color:' + sumItems[s][0] + ';">' + sumItems[s][3] + '</span></div>';
  }
  h += '</div><p style="font-size:12px;color:#aaaaaa;margin:0 0 24px 0;font-style:italic;">Targets are proposed benchmarks. Status auto-calculated: \u2265100% of target = On Track, 80\u201399% = Watch, &lt;80% = Action Required.</p>';
  h += '<div class="agency-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;">';
  for (var a = 0; a < sorted.length; a++) {
    var ag = sorted[a];
    var sl = ag.status === 'action' ? 'ACTION REQUIRED' : ag.status === 'watch' ? 'WATCH' : 'ON TRACK';
    var avatarColors = {NYCPS:'#2563eb',CUNY:'#7c3aed',SBS:'#d97706',NYCEDC:'#059669',DYCD:'#dc2626',HRA:'#0d9488','NYC TALENT':'#1470ad'};
    var avatarInits = {NYCPS:'PS',CUNY:'CU',SBS:'SB',NYCEDC:'ED',DYCD:'DY',HRA:'HR','NYC TALENT':'NT'};
    var avBg = avatarColors[ag.name] || '#999999';
    var avIn = avatarInits[ag.name] || ag.name.substring(0,2);
    h += '<div class="agency-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div style="display:flex;align-items:center;gap:12px;"><div style="width:32px;height:32px;border-radius:50%;background:' + avBg + ';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#ffffff;flex-shrink:0;">' + avIn + '</div><div><div style="font-size:18px;font-weight:700;color:' + C.text + ';">' + ag.name + '</div><div style="font-size:12px;color:#999999;margin-top:2px;">' + ag.fullName + '</div></div></div><span class="status-badge status-' + ag.status + '">' + sl + '</span></div>';
    h += '<p style="font-size:13px;color:#666666;margin:0 0 16px;line-height:1.6;">' + ag.description + '</p><div style="border-top:1px solid ' + C.border + ';padding-top:12px;">';
    for (var mi = 0; mi < ag.metrics.length; mi++) {
      var m = ag.metrics[mi];
      var sep = mi < ag.metrics.length - 1 ? 'border-bottom:1px solid #f2f2f0;' : '';
      var st = metricStatus(m);
      h += '<div class="agency-metric-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;' + sep + '">';
      h += '<span style="font-size:13px;color:#444444;flex:1;">' + m.label + '</span>';
      if (m.pending) {
        h += '<span class="data-pending" style="font-size:13px;color:#bbbbbb;font-style:italic;margin-right:10px;">Data pending</span>';
      } else {
        h += '<span style="font-size:14px;font-weight:600;color:' + sentimentColor(m.sentiment) + ';margin-right:10px;display:flex;align-items:center;gap:4px;"><span>' + trendArrow(m.trend) + '</span>' + m.value + '</span>';
      }
      if (m.target !== null && m.target !== undefined) {
        var tLabel = typeof m.target === 'number' && m.target > 1000 ? (m.target/1000).toFixed(0) + 'K' : m.target + (typeof m.target === 'number' && m.target <= 100 ? '%' : '');
        h += '<span style="font-size:11px;color:#aaaaaa;margin-right:8px;">Target: ' + tLabel + (m.targetYear ? ' by ' + m.targetYear : '') + '</span>';
      } else {
        h += '<span style="font-size:11px;color:#cccccc;margin-right:8px;">Target: TBD</span>';
      }
      h += statusDot(st);
      h += '</div>';
    }
    h += '</div><div style="font-size:11px;color:#bbbbbb;border-top:1px solid ' + C.border + ';padding-top:10px;margin-top:12px;">Owner: ' + ag.owner + '</div></div>';
  }
  return h + '</div>';
}

function buildHero(opts) {
  var hCls = 'hero-wrap';
  if (opts.activePage === null && opts.lastUpdated) hCls += ' hero-wrap-home';
  if (opts.activePage === null && !opts.lastUpdated && !opts.guidingQuestions) hCls += ' hero-wrap-short';
  var h = '<div class="' + hCls + '" style="position:relative;width:100%;height:' + opts.height + ';overflow:hidden;display:flex;flex-direction:column;">';
  // BG image + overlay
  h += '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background-image:url(' + opts.bgImage + ');background-size:cover;background-position:center;z-index:0;"></div>';
  h += '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1;"></div>';
  // Content layer
  h += '<div class="hero-content" style="position:relative;z-index:2;width:100%;max-width:1280px;margin:0 auto;padding:0 40px;display:flex;flex-direction:column;height:100%;">';
  // Nav row
  h += '<div class="hero-nav" style="display:flex;align-items:center;justify-content:space-between;padding-top:20px;margin-bottom:auto;">';

  h += '<div style="display:flex;align-items:center;gap:12px;">';

  h += '<span onclick="switchPage(\'home\')" style="font-size:14px;color:#ffffff;font-weight:500;cursor:pointer;">NYC Economic Mobility Dashboard</span>';
  h += '</div>';
  // Right: tabs
  var tabs = [
    {id:'people', full:'People & Pipeline', short:'People'},
    {id:'labor', full:'Labor Market & Sectors', short:'LMI'},
    {id:'fiscal', full:'Fiscal & Economic Outlook', short:'Fiscal'},
    {id:'mobilitystat', full:'MobilitySTAT', short:'MobilitySTAT'}

  for (var t = 0; t < tabs.length; t++) {
    var isActive = tabs[t].id === opts.activePage;
    h += '<button class="hero-tab' + (isActive ? ' active' : '') + '" onclick="switchPage(\'' + tabs[t].id + '\')">';
    h += '<span class="tab-full">' + tabs[t].full + '</span><span class="tab-short">' + tabs[t].short + '</span>';
    h += '</button>';
  }
  h += '</div></div>';
  // Title content (bottom)
  h += '<div style="padding-bottom:40px;">';
  var titleCls = opts.lastUpdated ? 'hero-title hero-title-home' : 'hero-title';
  h += '<div class="' + titleCls + '" style="font-size:' + (opts.lastUpdated ? '38' : '32') + 'px;font-weight:800;color:#ffffff;line-height:1.15;">' + opts.title + '</div>';

    h += '<div style="font-size:15px;color:rgba(255,255,255,0.5);margin-top:8px;">' + opts.subtitle + '</div>';

  }
  h += '</div></div></div>';
  return h;
}

/* ── HEADLINE FINDINGS (for landing page cards) ───────────────────────────── */

function getHeadlineFinding(layer) {
  if (layer === 'people') {
    var hsVal = educationTrends.hsGrad[educationTrends.hsGrad.length - 1];
    var hsPrev = educationTrends.hsGrad[educationTrends.hsGrad.length - 2];
    var hsDelta = Math.round((hsVal - hsPrev) * 10) / 10;
    var declined = 0; var total = 0;
    for (var i = 0; i < educationMetrics.length; i++) { total++; if (educationMetrics[i].sentiment === 'negative') declined++; }
    if (hsVal < hsPrev) {
      return { text: 'HS graduation rate fell to ' + hsVal + '%, down ' + Math.abs(hsDelta) + 'pp \u2014 steepest drop in 20 years. ' + declined + ' of ' + total + ' pipeline metrics negative.', sentiment: 'negative' };
    } else if (hsVal > hsPrev) {
      return { text: 'HS graduation rate improved to ' + hsVal + '%, but ' + declined + ' of ' + total + ' pipeline metrics remain negative.', sentiment: 'neutral' };
    }
    return { text: declined + ' of ' + total + ' pipeline metrics are flagged negative.', sentiment: 'negative' };
  }
  if (layer === 'labor') {
    var totalGain = 0; var topSector = ''; var topGain = 0;
    for (var i = 0; i < sectorData.changes.length; i++) {
      if (sectorData.changes[i] > 0) { totalGain += sectorData.changes[i]; if (sectorData.changes[i] > topGain) { topGain = sectorData.changes[i]; topSector = sectorData.sectors[i]; } }
    }
    var topPct = totalGain > 0 ? Math.round(topGain / totalGain * 100) : 0;
    var elCurrent = entryLevel.values[entryLevel.values.length - 1];
    var elDecline = Math.round((1 - elCurrent / 72.5) * 1000) / 10;
    if (topPct > 80) {
      return { text: topSector + ' accounts for ' + topPct + '% of all jobs added. Entry-level postings down ' + elDecline + '% since 2022.', sentiment: 'negative' };
    }
    return { text: 'Entry-level postings have fallen ' + elDecline + '% since 2022, from 72.5K to ' + elCurrent + 'K.', sentiment: 'negative' };
  }
  if (layer === 'fiscal') {
    var maxGap = 0; var maxGapYear = '';
    for (var i = 0; i < budgetGaps.without.length; i++) {
      if (budgetGaps.without[i] > maxGap) { maxGap = budgetGaps.without[i]; maxGapYear = budgetGaps.labels[i]; }
    }
    return { text: 'Projected $' + maxGap + 'B budget gap in ' + maxGapYear + ' without property tax increase. Cumulative PIT loss could reach $' + pitLost.accelerated[pitLost.accelerated.length-1] + 'M by ' + pitLost.labels[pitLost.labels.length-1] + '.', sentiment: 'negative' };
  }
  if (layer === 'mobilitystat') {
    var actionCount = 0; var pendingCount = 0; var totalMetrics = 0;
    for (var a = 0; a < agencies.length; a++) {
      if (agencies[a].status === 'action') actionCount++;
      for (var m = 0; m < agencies[a].metrics.length; m++) { totalMetrics++; if (agencies[a].metrics[m].pending) pendingCount++; }
    }
    if (actionCount > 0) {
      return { text: actionCount + ' of ' + agencies.length + ' agencies flagged for action. ' + pendingCount + ' of ' + totalMetrics + ' metrics lack current data.', sentiment: 'negative' };
    }
    return { text: 'All agencies on track. ' + pendingCount + ' metrics awaiting data.', sentiment: 'positive' };
  }
  return { text: '', sentiment: 'neutral' };
}

function selectScenario(idx) {
  // Update buttons
  for (var b = 0; b < 3; b++) {
    var btn = document.getElementById('scen-' + b);
    if (!btn) continue;
    if (b === idx) {
      btn.className = 'scenario-btn active';
      btn.style.background = '#1470ad';
      btn.style.borderColor = '#1470ad';
      btn.style.color = '#ffffff';
      btn.style.fontWeight = '600';
    } else {
      btn.className = 'scenario-btn';
      btn.style.background = '#ffffff';
      btn.style.borderColor = '#e8e8e5';
      btn.style.color = '#888888';
      btn.style.fontWeight = '500';
    }
  }
  // Find the revenue chart (second chart created in fiscal, index 1 in activeCharts after taxDonut at 0)
  var chart = null;
  for (var c = 0; c < activeCharts.length; c++) {
    if (activeCharts[c].canvas && activeCharts[c].canvas.id === 'revProjections') { chart = activeCharts[c]; break; }
  }
  if (!chart) return;
  for (var d = 0; d < 3; d++) {
    var ds = chart.data.datasets[d];
    if (d === idx) {
      ds.borderColor = scenarioColors[d].full;
      ds.borderWidth = 3;
      ds.pointRadius = 5;
      ds.pointBackgroundColor = scenarioColors[d].full;
      ds.borderDash = [];
    } else {
      ds.borderColor = scenarioColors[d].faded;
      ds.borderWidth = 1.5;
      ds.pointRadius = 0;
      ds.borderDash = [4, 4];
    }
  }
  chart.update();
}

  window.scrollTo(0, 0);

  var content = document.getElementById('content');

    destroyCharts();
    for (var i = 0; i < pages.length; i++) { if (pages[i].id === id) { pages[i].render(); break; } }

    window.scrollTo(0, 0);

  else if (key === '1') switchPage('people');
