    // ─── SHARED COMPONENTS ────────────────────────────────────────────────────

    function TrendArrow({ trend, sentiment }) {
      const color = sentiment === 'positive' ? C.green : sentiment === 'negative' ? C.red : sentiment === 'warning' ? C.amber : C.muted;
      if (trend === 'up') return <span style={{ color }}>↑</span>;
      if (trend === 'down') return <span style={{ color }}>↓</span>;
      return <span style={{ color: C.muted }}>→</span>;
    }

    function MetricCard({ label, value, context, trend, sentiment }) {
      const contextColor = sentiment === 'positive' ? C.green : sentiment === 'negative' ? C.red : sentiment === 'warning' ? C.amber : C.muted;
      return (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, padding: '16px' }}>
          <div style={{ fontSize: 10, letterSpacing: '0.08em', color: C.muted, marginBottom: 8, fontWeight: 600 }}>{label}</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1, marginBottom: 8 }}>{value}</div>
          <div style={{ fontSize: 12, color: contextColor, display: 'flex', alignItems: 'center', gap: 4 }}>
            {trend && <TrendArrow trend={trend} sentiment={sentiment} />}
            <span>{context}</span>
          </div>
        </div>
      );
    }

    function ChartSection({ title, children, source }) {
      return (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, padding: '20px', marginBottom: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, letterSpacing: '0.06em', marginBottom: 16, textTransform: 'uppercase' }}>{title}</div>
          {children}
          {source && <p className="source-cite">{source}</p>}
        </div>
      );
    }

        </div>
      );
    }

    const CHART_PROPS = {

    // ─── LAYER 1: PEOPLE & PIPELINE ───────────────────────────────────────────

    function FunnelBar({ data }) {
      const getColor = (pct) => {
        if (pct === null) return C.dim;
        if (pct >= 75) return C.green;
        if (pct >= 50) return C.amber;
        return C.red;
      };

      return (
        <div style={{ width: '100%' }}>
          {data.map((item, i) => (
            <div key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontSize: 12, color: C.muted }}>{item.stage}</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: item.pct !== null ? C.text : C.dim }}>
                  {item.count}{item.pct !== null ? ` (${item.pct}%)` : ' (unknown)'}
                </span>
              </div>
              <div style={{ height: 20, background: C.border, position: 'relative' }}>
                <div style={{
                  width: item.pct !== null ? `${item.pct}%` : '10%',
                  height: '100%',
                  background: getColor(item.pct),
                  opacity: item.pct !== null ? 1 : 0.3,
                  transition: 'width 0.5s ease'
                }} />
              </div>
            </div>
          ))}
          <div style={{ display: 'flex', gap: 16, marginTop: 12 }}>
            {[['■ Healthy (>75%)', C.green], ['■ Concerning (50–75%)', C.amber], ['■ Critical (<50%)', C.red], ['■ Unknown', C.dim]].map(([label, color]) => (
              <span key={label} style={{ fontSize: 11, color }}>{label}</span>
            ))}
          </div>
        </div>
      );
    }

    // ─── LAYER 2: LABOR MARKET & SECTORS ─────────────────────────────────────

      const CustomLabel = (props) => {
        const { x, y, width, height, value, index } = props;
        const item = data[index];
        const isPos = item.change > 0;
        return (
          <text
            x={isPos ? x + width + 6 : x - 6}
            y={y + height / 2 + 4}
            fill={C.muted}
            fontSize={10}
            textAnchor={isPos ? 'start' : 'end'}
          >
            ${item.medianWage}/hr
          </text>
        );
      };

      return (
        <ResponsiveContainer width="100%" height={280}>
          <BarChart data={data} layout="vertical" margin={{ top: 4, right: 80, left: 0, bottom: 4 }}>
            <CartesianGrid {...CHART_PROPS.gridStyle} horizontal={false} />
            <XAxis type="number" tick={CHART_PROPS.axisStyle} tickFormatter={v => v >= 0 ? `+${(v/1000).toFixed(0)}K` : `${(v/1000).toFixed(0)}K`} />
            <YAxis type="category" dataKey="sector" tick={{ fontSize: 11, fill: C.muted }} width={130} />
            <Tooltip
              formatter={(v) => [`${v >= 0 ? '+' : ''}${v.toLocaleString()}`, 'Job Change']}
              contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }}
            />
            <ReferenceLine x={0} stroke={C.border} />
            <Bar dataKey="change" radius={0}>
              {data.map((entry, i) => (
                <Cell key={i} fill={entry.change >= 0 ? C.green : C.red} />
              ))}
              <LabelList content={<CustomLabel />} />
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );

            <CartesianGrid {...CHART_PROPS.gridStyle} />
            <XAxis dataKey="year" tick={CHART_PROPS.axisStyle} />
            <YAxis tick={CHART_PROPS.axisStyle} tickFormatter={v => `${v}K`} />
            <Tooltip formatter={(v) => [`${v}K`, 'Jobs Added']} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
            <Bar dataKey="jobs" radius={0}>
              {jobCreationTrend.map((_, i) => <Cell key={i} fill={intensities[i]} />)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    function LaborMarket() {
      return (
        <div>
          <SectionHeader title="Labor Market & Sectors" subtitle="Employment trends, sector performance, and job market health — Dec 2025" />

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 12, marginBottom: 16 }}>
            {employmentMetrics.map((m, i) => <MetricCard key={i} {...m} />)}
          </div>

          <ChartSection title="Employment Change by Sector — Over-the-Year (Median Hourly Wage in Gray)" source="Source: NYS DOL, BLS QCEW. Placeholder — verify with source documents.">
            <SectorBar data={sectorChanges} />
            <p style={{ fontSize: 11, color: C.amber, marginTop: 8 }}>
              ⚠ After benchmark revisions, gains in Professional & Business Services and Information are expected to be revised away (NYC Comptroller, Feb 2026).
            </p>
          </ChartSection>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <ChartSection title="Private Sector Job Creation — Jan–Jul by Year (thousands)" source="Source: NYS DOL. Placeholder.">
              <JobCreationChart />
            </ChartSection>

            <ChartSection title="Entry-Level Job Postings 2019–2024 (thousands)" source="Source: Lightcast / NYCEDC. Placeholder.">
              <ResponsiveContainer width="100%" height={200}>
                <LineChart data={entryLevelPostings} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                  <CartesianGrid {...CHART_PROPS.gridStyle} />
                  <XAxis dataKey="year" tick={CHART_PROPS.axisStyle} />
                  <YAxis domain={[0, 100]} tick={CHART_PROPS.axisStyle} tickFormatter={v => `${v}K`} />
                  <Tooltip formatter={(v) => [`${v}K`, 'Postings']} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
                  <ReferenceLine y={93} stroke={C.muted} strokeDasharray="5 3" label={{ value: "~93K annual grad supply", position: 'top', fill: C.muted, fontSize: 11 }} />
                  <Line type="monotone" dataKey="postings" name="Entry-Level Postings" stroke={C.blue} strokeWidth={2} dot={{ fill: C.blue, r: 3 }} />
                </LineChart>
              </ResponsiveContainer>
            </ChartSection>
          </div>
        </div>
      );
    }

    // ─── LAYER 3: FISCAL & ECONOMIC OUTLOOK ───────────────────────────────────

    const PIE_COLORS = [C.blue, C.cyan, C.indigo, C.purple, C.amber];

    function TaxDonut() {
      const RADIAN = Math.PI / 180;
      const renderLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent, name, amount }) => {
        const radius = innerRadius + (outerRadius - innerRadius) * 1.4;
        const x = cx + radius * Math.cos(-midAngle * RADIAN);
        const y = cy + radius * Math.sin(-midAngle * RADIAN);
        return (
          <text x={x} y={y} fill={C.muted} textAnchor={x > cx ? 'start' : 'end'} dominantBaseline="central" fontSize={11}>
            {name} ${amount}B
          </text>
        );
      };
      return (
        <ResponsiveContainer width="100%" height={280}>
          <PieChart>
            <Pie data={taxRevenueSources} cx="50%" cy="50%" innerRadius={70} outerRadius={110}
              dataKey="amount" nameKey="source" labelLine={false} label={renderLabel}>
              {taxRevenueSources.map((_, i) => <Cell key={i} fill={PIE_COLORS[i]} />)}
            </Pie>
            <Tooltip formatter={(v, n) => [`$${v}B`, n]} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
          </PieChart>
        </ResponsiveContainer>
      );
    }

    function FiscalOutlook() {
      return (
        <div>
          <SectionHeader title="Fiscal & Economic Outlook" subtitle="Tax revenues, budget gaps, and multi-year projections" />

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 12, marginBottom: 16 }}>
            {fiscalMetrics.map((m, i) => <MetricCard key={i} {...m} />)}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: 16 }}>
            <ChartSection title="FY2026 Tax Revenue by Source" source="Source: NYC OMB. Placeholder.">
              <TaxDonut />
            </ChartSection>

            <ChartSection title="Revenue Projections FY2025–FY2030 ($B) — Three Scenarios" source="Source: NYC OMB, NYC Comptroller. Placeholder.">
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={revenueProjections} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                  <CartesianGrid {...CHART_PROPS.gridStyle} />
                  <XAxis dataKey="year" tick={CHART_PROPS.axisStyle} />
                  <YAxis domain={[75, 105]} tick={CHART_PROPS.axisStyle} tickFormatter={v => `$${v}B`} />
                  <Tooltip formatter={(v) => [`$${v}B`]} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
                  <Legend wrapperStyle={{ fontSize: 12 }} />
                  <ReferenceArea dataKey="omb" fill={C.red} fillOpacity={0.06} />
                  <Line type="monotone" dataKey="omb" name="OMB Forecast" stroke={C.blue} strokeWidth={2} dot={false} />
                  <Line type="monotone" dataKey="comptroller" name="Comptroller Forecast" stroke={C.green} strokeWidth={2} dot={false} />
                  <Line type="monotone" dataKey="stagnation" name="Stagnation Scenario" stroke={C.red} strokeWidth={1.5} strokeDasharray="5 3" dot={false} />
                </LineChart>
              </ResponsiveContainer>
            </ChartSection>
          </div>

          <ChartSection title="Projected Budget Gaps FY2026–FY2030 ($B) — With vs. Without Property Tax Increase" source="Source: NYC Comptroller, CBC. Placeholder.">
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={budgetGaps} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                <CartesianGrid {...CHART_PROPS.gridStyle} />
                <XAxis dataKey="year" tick={CHART_PROPS.axisStyle} />
                <YAxis tick={CHART_PROPS.axisStyle} tickFormatter={v => `$${v}B`} />
                <Tooltip formatter={(v) => [`$${v}B`]} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Bar dataKey="withIncrease" name="With Property Tax Increase" fill={C.blue} radius={0} />
                <Bar dataKey="without" name="Without Property Tax Increase" fill={C.red} radius={0} />
              </BarChart>
            </ResponsiveContainer>
          </ChartSection>

          <ChartSection title="Entry-Level Jobs vs. Annual Graduate Supply 2022–2031 (thousands)" source="Source: BLS Employment Projections 2024–2034, Lightcast, CUNY IR. Placeholder.">
            <ResponsiveContainer width="100%" height={280}>
              <LineChart data={entryLevelVsSupply} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                <CartesianGrid {...CHART_PROPS.gridStyle} />
                <XAxis dataKey="year" tick={CHART_PROPS.axisStyle} />
                <YAxis domain={[20, 100]} tick={CHART_PROPS.axisStyle} tickFormatter={v => `${v}K`} />
                <Tooltip formatter={(v) => [`${v}K`]} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <ReferenceArea y1={20} y2={93} fill={C.red} fillOpacity={0.04} />
                <Line type="monotone" dataKey="supply" name="Annual Graduate Supply" stroke={C.muted} strokeWidth={1.5} strokeDasharray="6 3" dot={false} />
                <Line type="monotone" dataKey="baseline" name="BLS Baseline" stroke={C.blue} strokeWidth={2} dot={false} />
                <Line type="monotone" dataKey="moderate" name="Moderate Displacement" stroke={C.amber} strokeWidth={2} dot={false} />
                <Line type="monotone" dataKey="accelerated" name="Accelerated Displacement" stroke={C.red} strokeWidth={2} dot={false} />
              </LineChart>
            </ResponsiveContainer>
          </ChartSection>

          <ChartSection title="Cumulative PIT Revenue Lost from Underemployed Graduates ($M) — 2022–2031" source="Source: NYC Comptroller PIT analysis, Center for an Urban Future estimates. Placeholder.">
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={pitRevenueLost} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                <CartesianGrid {...CHART_PROPS.gridStyle} />
                <XAxis dataKey="year" tick={CHART_PROPS.axisStyle} />
                <YAxis tick={CHART_PROPS.axisStyle} tickFormatter={v => `$${v}M`} />
                <Tooltip formatter={(v) => [`$${v}M`]} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, fontSize: 12 }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Bar dataKey="moderate" name="Moderate Scenario" fill={C.blue} radius={0} />
                <Bar dataKey="accelerated" name="Accelerated Scenario" fill={C.red} radius={0} />
              </BarChart>
            </ResponsiveContainer>
          </ChartSection>
        </div>
      );
    }

    // ─── LAYER 4: MOBILITYSTAT ────────────────────────────────────────────────

    function StatusBadge({ status }) {
      const config = {
        action: { label: 'Action Required', color: C.red, bg: 'rgba(239,68,68,0.1)' },
        watch: { label: 'Watch', color: C.amber, bg: 'rgba(245,158,11,0.1)' },
        track: { label: 'On Track', color: C.green, bg: 'rgba(16,185,129,0.1)' }
      }[status] || { label: 'Unknown', color: C.muted, bg: 'transparent' };
      return (
        <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', color: config.color, background: config.bg, border: `1px solid ${config.color}`, padding: '2px 8px' }}>
          {config.label.toUpperCase()}
        </span>
      );
    }

    function AgencyCard({ name, fullName, description, owner, status, metrics }) {
      const sentimentColor = (s, t) => {
        if (s === 'positive') return C.green;
        if (s === 'negative') return C.red;
        if (s === 'warning') return C.amber;
        return C.muted;
      };
      return (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, padding: '16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{name}</div>
              <div style={{ fontSize: 11, color: C.muted }}>{fullName}</div>
            </div>
            <StatusBadge status={status} />
          </div>
          <p style={{ fontSize: 12, color: C.dim, margin: 0 }}>{description}</p>
          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 12 }}>
            {metrics.map((m, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: i < metrics.length - 1 ? 8 : 0 }}>
                <span style={{ fontSize: 12, color: C.muted }}>{m.label}</span>
                {m.pending ? (
                  <span style={{ fontSize: 11, color: C.dim, fontStyle: 'italic' }}>Data pending</span>
                ) : (
                  <span style={{ fontSize: 13, fontWeight: 600, color: sentimentColor(m.sentiment), display: 'flex', alignItems: 'center', gap: 4 }}>
                    {m.trend && <TrendArrow trend={m.trend} sentiment={m.sentiment} />}
                    {m.value}
                  </span>
                )}
              </div>
            ))}
          </div>
          <div style={{ fontSize: 10, color: C.dim, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>Owner: {owner}</div>
        </div>
      );
    }

    function MobilitySTAT() {
      const statusOrder = { action: 0, watch: 1, track: 2 };
      const sorted = [...agencies].sort((a, b) => statusOrder[a.status] - statusOrder[b.status]);
      const counts = { action: agencies.filter(a => a.status === 'action').length, watch: agencies.filter(a => a.status === 'watch').length, track: agencies.filter(a => a.status === 'track').length };
      return (
        <div>
          <SectionHeader title="MobilitySTAT" subtitle="Agency accountability — owned metrics with trend indicators" />
          <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
            {[['action', C.red, 'Action Required'], ['watch', C.amber, 'Watch'], ['track', C.green, 'On Track']].map(([k, color, label]) => (
              <div key={k} style={{ background: C.card, border: `1px solid ${C.border}`, padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ width: 8, height: 8, background: color, display: 'inline-block' }}></span>
                <span style={{ fontSize: 12, color: C.muted }}>{label}</span>
                <span style={{ fontSize: 18, fontWeight: 700, color }}>{counts[k]}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 16 }}>
            {sorted.map((a, i) => <AgencyCard key={i} {...a} />)}
          </div>
        </div>
      );
    }

    // ─── LAYOUT ───────────────────────────────────────────────────────────────

    const NAV_ITEMS = [
      { id: 'people', label: 'People & Pipeline', layer: '01' },
      { id: 'labor', label: 'Labor Market & Sectors', layer: '02' },
      { id: 'fiscal', label: 'Fiscal & Economic Outlook', layer: '03' },
      { id: 'mobilitystat', label: 'MobilitySTAT', layer: '04' }
    ];

    function App() {
      const [active, setActive] = useState('people');

      const pages = {
        people: <PeoplePipeline />,
        labor: <LaborMarket />,
        fiscal: <FiscalOutlook />,
        mobilitystat: <MobilitySTAT />
      };

      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
          {/* Sidebar */}
          <div style={{ width: 220, background: '#0b1628', borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
            <div style={{ padding: '20px 16px', borderBottom: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.blue, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 4 }}>Office of the</div>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.blue, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 8 }}>Deputy Mayor</div>
              <div style={{ fontSize: 10, color: C.dim, letterSpacing: '0.06em' }}>Economic Mobility</div>
            </div>
            <nav style={{ flex: 1, padding: '12px 0' }}>
              {NAV_ITEMS.map(item => (
                <button
                  key={item.id}
                  onClick={() => setActive(item.id)}
                  style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    padding: '12px 16px', background: active === item.id ? C.card : 'transparent',
                    borderLeft: active === item.id ? `3px solid ${C.blue}` : '3px solid transparent',
                    border: 'none', cursor: 'pointer', transition: 'background 0.15s'
                  }}
                >
                  <div style={{ fontSize: 10, color: active === item.id ? C.blue : C.dim, letterSpacing: '0.08em', marginBottom: 3 }}>LAYER {item.layer}</div>
                  <div style={{ fontSize: 13, color: active === item.id ? C.text : C.muted, fontWeight: active === item.id ? 600 : 400 }}>{item.label}</div>
                </button>
              ))}
            </nav>
            <div style={{ padding: '16px', borderTop: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 10, color: C.dim }}>Last updated</div>
              <div style={{ fontSize: 11, color: C.muted, fontWeight: 500 }}>March 2026</div>
            </div>
          </div>

          {/* Main content */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            {/* Header */}
            <div style={{ background: '#0b1628', borderBottom: `1px solid ${C.border}`, padding: '14px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
              <div>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.text, letterSpacing: '0.04em' }}>NYC ECONOMIC MOBILITY DASHBOARD</span>
              </div>
              <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
                <span style={{ fontSize: 11, color: C.dim }}>v1.0 · Internal Use Only</span>
                <span style={{ fontSize: 11, color: C.muted, background: C.card, padding: '3px 10px', border: `1px solid ${C.border}` }}>DEC 2025 DATA</span>
              </div>
            </div>

            {/* Page content */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '24px' }}>
              {pages[active]}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
