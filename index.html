function sentimentColor(s) { return s==='positive'?C.green:s==='negative'?C.red:s==='warning'?C.amber:C.muted; }
function trendArrow(t) { return t==='up'?'\u2191':t==='down'?'\u2193':'\u2192'; }
function funnelColor(p) { return p===null?C.dim:p>=75?C.green:p>=50?C.amber:C.red; }

function metricCardsHTML(metrics) {
  var h = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px;">';
  for (var i = 0; i < metrics.length; i++) {
    var m = metrics[i];
    var arrow = m.trend ? '<span>' + trendArrow(m.trend) + '</span>' : '';
    h += '<div class="metric-card"><div style="font-size:10px;letter-spacing:0.08em;color:' + C.muted + ';margin-bottom:8px;font-weight:600;">' + m.label + '</div><div style="font-size:28px;font-weight:700;color:' + C.text + ';line-height:1;margin-bottom:8px;">' + m.value + '</div><div style="font-size:12px;color:' + sentimentColor(m.sentiment) + ';display:flex;align-items:center;gap:4px;">' + arrow + '<span>' + m.context + '</span></div></div>';
  }
  return h + '</div>';
}
function sectionHeader(title, subtitle) {
  var sub = subtitle ? '<p style="font-size:12px;color:' + C.muted + ';margin:4px 0 0;">' + subtitle + '</p>' : '';
  return '<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid ' + C.border + ';"><h2 style="font-size:18px;font-weight:700;color:' + C.text + ';margin:0;">' + title + '</h2>' + sub + '</div>';
}
function chartBox(id, title, source, extra) {
  var src = source ? '<p class="source-cite">' + source + '</p>' : '';
  return '<div class="chart-section"><div class="chart-title">' + title + '</div><div><canvas id="' + id + '"></canvas></div>' + (extra || '') + src + '</div>';
}
var activeCharts = [];
function destroyCharts() { for (var i = 0; i < activeCharts.length; i++) activeCharts[i].destroy(); activeCharts = []; }
function addChart(c) { activeCharts.push(c); return c; }

function buildFunnelHTML() {
  var rows = '';
  for (var i = 0; i < funnelStages.length; i++) {
    var s = funnelStages[i];
    var vc = s.pct !== null ? C.text : C.dim;
    var vt = s.count + (s.pct !== null ? ' (' + s.pct + '%)' : ' (unknown)');
    var bw = s.pct !== null ? s.pct : 10;
    var bc = funnelColor(s.pct);
    var bo = s.pct !== null ? 1 : 0.3;
    rows += '<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:12px;color:' + C.muted + ';">' + s.stage + '</span><span style="font-size:12px;font-weight:600;color:' + vc + ';">' + vt + '</span></div><div class="funnel-bar-bg"><div class="funnel-bar-fill" style="width:' + bw + '%;background:' + bc + ';opacity:' + bo + ';"></div></div></div>';
  }
  return '<div class="chart-section"><div class="chart-title">Education Pipeline \u2014 Cohort Funnel (per ~72,000 students entering 9th grade)</div>' + rows + '<div style="display:flex;gap:16px;margin-top:12px;"><span style="font-size:11px;color:' + C.green + ';">\u25A0 Healthy (&gt;75%)</span><span style="font-size:11px;color:' + C.amber + ';">\u25A0 Concerning (50\u201375%)</span><span style="font-size:11px;color:' + C.red + ';">\u25A0 Critical (&lt;50%)</span><span style="font-size:11px;color:' + C.dim + ';">\u25A0 Unknown</span></div><p class="source-cite">Source: NYC DOE InfoHub, CUNY IR Data Book, Center for an Urban Future (2026).</p></div>';
}

function buildAgencyCards(sorted, counts) {
  var h = '<div style="display:flex;gap:12px;margin-bottom:20px;">';
  var sts = [['action',C.red,'Action Required'],['watch',C.amber,'Watch'],['track',C.green,'On Track']];
  for (var s = 0; s < sts.length; s++) {
    h += '<div style="background:' + C.card + ';border:1px solid ' + C.border + ';padding:10px 16px;display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;background:' + sts[s][1] + ';display:inline-block;"></span><span style="font-size:12px;color:' + C.muted + ';">' + sts[s][2] + '</span><span style="font-size:18px;font-weight:700;color:' + sts[s][1] + ';">' + counts[sts[s][0]] + '</span></div>';
  }
  h += '</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">';
  for (var a = 0; a < sorted.length; a++) {
    var ag = sorted[a];
    var sl = ag.status === 'action' ? 'ACTION REQUIRED' : ag.status === 'watch' ? 'WATCH' : 'ON TRACK';
    h += '<div class="agency-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div><div style="font-size:16px;font-weight:700;color:' + C.text + ';">' + ag.name + '</div><div style="font-size:11px;color:' + C.muted + ';">' + ag.fullName + '</div></div><span class="status-badge status-' + ag.status + '">' + sl + '</span></div><p style="font-size:12px;color:' + C.dim + ';margin:0 0 12px;">' + ag.description + '</p><div style="border-top:1px solid ' + C.border + ';padding-top:12px;">';
    for (var mi = 0; mi < ag.metrics.length; mi++) {
      var m = ag.metrics[mi];
      var mb = mi < ag.metrics.length - 1 ? 'margin-bottom:8px;' : '';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;' + mb + '"><span style="font-size:12px;color:' + C.muted + ';">' + m.label + '</span>';
      if (m.pending) {
        h += '<span class="data-pending" style="font-size:11px;color:' + C.dim + ';font-style:italic;">Data pending</span>';
      } else {
        h += '<span style="font-size:13px;font-weight:600;color:' + sentimentColor(m.sentiment) + ';display:flex;align-items:center;gap:4px;"><span>' + trendArrow(m.trend) + '</span>' + m.value + '</span>';
      }
      h += '</div>';
    }
    h += '</div><div style="font-size:10px;color:' + C.dim + ';border-top:1px solid ' + C.border + ';padding-top:8px;margin-top:12px;">Owner: ' + ag.owner + '</div></div>';
  }
  return h + '</div>';
}

  destroyCharts();
  addChart(new Chart(document.getElementById('eduTrends'), {
    type:'line',
    data:{ labels:educationTrends.labels, datasets:[
      { label:'HS Graduation Rate', data:educationTrends.hsGrad, borderColor:C.blue, borderWidth:2, pointRadius:1, tension:0.3 },

      { label:"CUNY 6-yr Bachelor's Completion", data:educationTrends.cuny6yr, borderColor:C.green, borderWidth:2, pointRadius:1, tension:0.3 }
    ]},
    options:{ responsive:true, aspectRatio:2.5, scales:{ y:{ min:30, max:100, ticks:{ callback:function(v){return v+'%';} } } }, plugins:{ tooltip:{ callbacks:{ label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y+'%';} } } } }
  }));
}

  addChart(new Chart(document.getElementById('sectorChart'), {
    type:'bar',
    data:{ labels:sectorData.sectors, datasets:[{ data:sectorData.changes, backgroundColor:sectorData.changes.map(function(v){return v>=0?C.green:C.red;}), borderWidth:0 }] },
    options:{ indexAxis:'y', responsive:true, aspectRatio:2, scales:{ x:{ ticks:{ callback:function(v){return (v>=0?'+':'')+Math.round(v/1000)+'K';} } } }, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ var i=ctx.dataIndex; return (ctx.parsed.x>=0?'+':'')+ctx.parsed.x.toLocaleString()+' jobs \u00B7 $'+sectorData.wages[i]+'/hr median'; } } } } }
  }));
  addChart(new Chart(document.getElementById('jobCreationChart'), {
    type:'bar',
    data:{ labels:jobCreation.labels, datasets:[{ data:jobCreation.values, backgroundColor:['#7f1d1d','#b91c1c','#dc2626','#ef4444'], borderWidth:0 }] },
    options:{ responsive:true, aspectRatio:1.8, scales:{ y:{ ticks:{ callback:function(v){return v+'K';} } } }, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){return ctx.parsed.y+'K jobs';} } } } }
  }));
  addChart(new Chart(document.getElementById('entryLevelChart'), {
    type:'line',
    data:{ labels:entryLevel.labels, datasets:[
      { label:'Entry-Level Postings', data:entryLevel.values, borderColor:C.blue, borderWidth:2, pointRadius:3, tension:0.3 },
      { label:'~93K Annual Grad Supply', data:[93,93,93,93,93,93], borderColor:C.muted, borderWidth:1.5, borderDash:[5,3], pointRadius:0, fill:false }
    ]},
    options:{ responsive:true, aspectRatio:1.8, scales:{ y:{ min:0, max:100, ticks:{ callback:function(v){return v+'K';} } } }, plugins:{ tooltip:{ callbacks:{ label:function(ctx){return ctx.parsed.y+'K';} } } } }
  }));
}

function renderFiscalOutlook() {
  document.getElementById('content').innerHTML =
    sectionHeader('Fiscal & Economic Outlook', 'Tax revenues, budget gaps, and multi-year projections') +
    metricCardsHTML(fiscalMetrics) +
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;">' +
    chartBox('taxDonut', 'FY2026 Tax Revenue by Source', 'Source: NYC OMB.') +
    chartBox('revProjections', 'Revenue Projections FY2025\u2013FY2030 ($B) \u2014 Three Scenarios', 'Source: NYC OMB, NYC Comptroller.') + '</div>' +
    chartBox('budgetGapChart', 'Projected Budget Gaps FY2026\u2013FY2030 ($B)', 'Source: NYC Comptroller, CBC.') +
    chartBox('elvSupplyChart', 'Entry-Level Jobs vs. Annual Graduate Supply 2022\u20132031 (thousands)', 'Source: BLS, Lightcast, CUNY IR.') +
    chartBox('pitLostChart', 'Cumulative PIT Revenue Lost from Underemployed Graduates ($M)', 'Source: NYC Comptroller, Center for an Urban Future.');
  destroyCharts();
  addChart(new Chart(document.getElementById('taxDonut'), {
    type:'doughnut',
    data:{ labels:taxSources.labels, datasets:[{ data:taxSources.amounts, backgroundColor:[C.blue,C.cyan,C.indigo,C.purple,C.amber], borderWidth:0 }] },
    options:{ responsive:true, cutout:'55%', plugins:{ legend:{ position:'bottom', labels:{padding:10} }, tooltip:{ callbacks:{ label:function(ctx){return ' $'+ctx.parsed+'B ('+taxSources.shares[ctx.dataIndex]+'%)';} } } } }
  }));
  addChart(new Chart(document.getElementById('revProjections'), {
    type:'line',
    data:{ labels:revProjections.labels, datasets:[
      { label:'OMB Forecast', data:revProjections.omb, borderColor:C.blue, borderWidth:2, pointRadius:1, tension:0.3, fill:false },
      { label:'Comptroller Forecast', data:revProjections.comptroller, borderColor:C.green, borderWidth:2, pointRadius:1, tension:0.3, fill:false },
      { label:'Stagnation Scenario', data:revProjections.stagnation, borderColor:C.red, borderWidth:1.5, borderDash:[5,3], pointRadius:1, tension:0.3, fill:{ target:0, above:'rgba(239,68,68,0.06)' } }
    ]},
    options:{ responsive:true, aspectRatio:2, scales:{ y:{ min:75, max:105, ticks:{ callback:function(v){return '$'+v+'B';} } } }, plugins:{ tooltip:{ callbacks:{ label:function(ctx){return ctx.dataset.label+': $'+ctx.parsed.y+'B';} } } } }
  }));
  addChart(new Chart(document.getElementById('budgetGapChart'), {
    type:'bar',
    data:{ labels:budgetGaps.labels, datasets:[
      { label:'With Property Tax Increase', data:budgetGaps.withIncrease, backgroundColor:C.blue, borderWidth:0 },
      { label:'Without Property Tax Increase', data:budgetGaps.without, backgroundColor:C.red, borderWidth:0 }
    ]},
    options:{ responsive:true, aspectRatio:2.5, scales:{ y:{ ticks:{ callback:function(v){return '$'+v+'B';} } } }, plugins:{ tooltip:{ callbacks:{ label:function(ctx){return ctx.dataset.label+': $'+ctx.parsed.y+'B';} } } } }
  }));
  addChart(new Chart(document.getElementById('elvSupplyChart'), {
    type:'line',
    data:{ labels:elvSupply.labels, datasets:[
      { label:'Annual Graduate Supply', data:elvSupply.supply, borderColor:C.muted, borderWidth:1.5, borderDash:[6,3], pointRadius:0, fill:false },
      { label:'BLS Baseline', data:elvSupply.baseline, borderColor:C.blue, borderWidth:2, pointRadius:1, tension:0.3, fill:false },
      { label:'Moderate Displacement', data:elvSupply.moderate, borderColor:C.amber, borderWidth:2, pointRadius:1, tension:0.3, fill:false },
      { label:'Accelerated Displacement', data:elvSupply.accelerated, borderColor:C.red, borderWidth:2, pointRadius:1, tension:0.3, fill:{ target:0, above:'rgba(239,68,68,0.06)' } }
    ]},
    options:{ responsive:true, aspectRatio:2.2, scales:{ y:{ min:20, max:100, ticks:{ callback:function(v){return v+'K';} } } }, plugins:{ tooltip:{ callbacks:{ label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y+'K';} } } } }
  }));
  addChart(new Chart(document.getElementById('pitLostChart'), {
    type:'bar',
    data:{ labels:pitLost.labels, datasets:[
      { label:'Moderate Scenario', data:pitLost.moderate, backgroundColor:C.blue, borderWidth:0 },
      { label:'Accelerated Scenario', data:pitLost.accelerated, backgroundColor:C.red, borderWidth:0 }
    ]},
    options:{ responsive:true, aspectRatio:2.5, scales:{ y:{ ticks:{ callback:function(v){return '$'+v+'M';} } } }, plugins:{ tooltip:{ callbacks:{ label:function(ctx){return ctx.dataset.label+': $'+ctx.parsed.y+'M';} } } } }
  }));
}

function renderMobilitySTAT() {
  var statusOrder = { action:0, watch:1, track:2 };
  var sorted = agencies.slice().sort(function(a,b){ return statusOrder[a.status]-statusOrder[b.status]; });
  var counts = { action:0, watch:0, track:0 };
  for (var i = 0; i < agencies.length; i++) counts[agencies[i].status]++;
  document.getElementById('content').innerHTML =
    sectionHeader('MobilitySTAT', 'Agency accountability \u2014 owned metrics with trend indicators') +
    buildAgencyCards(sorted, counts);
  destroyCharts();
}

var pages = [
  { id:'people', label:'People & Pipeline', layer:'01', render:renderPeoplePipeline },
  { id:'labor', label:'Labor Market & Sectors', layer:'02', render:renderLaborMarket },
  { id:'fiscal', label:'Fiscal & Economic Outlook', layer:'03', render:renderFiscalOutlook },
  { id:'mobilitystat', label:'MobilitySTAT', layer:'04', render:renderMobilitySTAT }
];
var activePage = 'people';

function renderNav() {
  var h = '';
  for (var i = 0; i < pages.length; i++) {
    var p = pages[i], act = p.id === activePage;
    h += '<button class="nav-btn' + (act?' active':'') + '" onclick="switchPage(\'' + p.id + '\')">' +
      '<div style="font-size:10px;color:' + (act?C.blue:C.dim) + ';letter-spacing:0.08em;margin-bottom:3px;">LAYER ' + p.layer + '</div>' +
      '<div style="font-size:13px;color:' + (act?C.text:C.muted) + ';font-weight:' + (act?600:400) + ';">' + p.label + '</div></button>';
  }
  document.getElementById('nav').innerHTML = h;
}
function switchPage(id) {
  activePage = id;
  renderNav();
  var content = document.getElementById('content');
  content.style.opacity = '0';
  setTimeout(function() {
    for (var i = 0; i < pages.length; i++) { if (pages[i].id === id) { pages[i].render(); break; } }
    content.style.opacity = '1';
  }, 80);
}

document.getElementById('lastUpdated').textContent = LAST_UPDATED;
document.getElementById('dataPeriod').textContent = DATA_PERIOD;
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  var key = e.key;
  if (key === '1') switchPage('people');
  else if (key === '2') switchPage('labor');
  else if (key === '3') switchPage('fiscal');
  else if (key === '4') switchPage('mobilitystat');
});
try { renderNav(); renderPeoplePipeline(); } catch(e) {
  document.getElementById('content').innerHTML = '<pre style="color:#ef4444;padding:20px;">ERROR: ' + e.message + '\n' + e.stack + '</pre>';
}
</script>
